<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/reset.css">
   <link rel="stylesheet" href="css/style.css">
   <title>Basic Design</title>
</head>
<body>
   <header class="header">
      <div class="header__container">
         <img src="images\heart.png" alt="" class="header__heart">
         <a href="" class="header__logo-link">
            <img src="images\logo.png" alt="" class="header__logo">
         </a>
      </div>
   </header>
   <main class="main">
      <h1 class="main__title">
         <strong style="color:rgb(179, 1, 1)">ЛЮБОВЬ</strong> — это прикосновение
      </h1>
      
      <h2 class="main__subtitle">Откройте для себя моменты нежности и близости</h2>
   </main>

   <section class="first-date">
      
      
      <h1 class="first-date__title">
            НАША ПЕРВАЯ ВСТРЕЧА
      </h1>
      
      <div class="first-date__sample">
         <img src="images\hearts-b2.png" alt="" class="first-date__sample-img">
         <div class="first-date__wrapper">
            <img src="" alt="" class="first-date__img">
            <img src="" alt="" class="first-date__img">
         </div>
         
      </div>
      
      <h2 class="first-date__subtitle">самое <strong style="color:rgb(179, 1, 1)">НЕЛОВКОЕ</strong> свидание...</h2>
      <div class="first-date__hearts-container" id="hearts-containers">
      </div>
   </section>
   <script src="js\hearts.js"></script>

   <section class="roses">
      <!-- <img src="images\roses-bg.png" alt="" class="roses__bg"> -->

      <div class="roses__wrapper">
         <img src="" alt="" class="roses__rose-img">
         <img src="" alt="" class="roses__rose-img">
         <img src="" alt="" class="roses__rose-img">
      </div>
      
      <img src="images\rose.png" alt="" class="roses__rose-l">
      <img src="images\rose.png" alt="" class="roses__rose-r">
   </section>

   <section class="slider">

      <video  class="slider__bg" autoplay muted loop playsinline>
         <source src="videos\bg_video_slider.webm">
      </video>

      <div class="slider__wrapper">
         <div class="slider__slide">
            <img src="images\slider-sample.png" alt="" class="slider__slide-sample-img">
            <img src="" alt="" class="slider__slide-img">
         </div>
         <div class="slider__slide">
            <img src="images\slider-sample.png" alt="" class="slider__slide-sample-img">
            <img src="" alt="" class="slider__slide-img">
         </div>
         <div class="slider__slide">
            <img src="images\slider-sample.png" alt="" class="slider__slide-sample-img">
            <img src="" alt="" class="slider__slide-img">
         </div>
         <div class="slider__slide">
            <img src="images\slider-sample.png" alt="" class="slider__slide-sample-img">
            <img src="" alt="" class="slider__slide-img">
         </div> 
         <div class="slider__slide">
            <img src="images\slider-sample.png" alt="" class="slider__slide-sample-img">
            <img src="" alt="" class="slider__slide-img">
         </div> 
         
         
      </div>
      <div class="slider__btn-wrapper">
         <button class="slider__btn prev"><</button>
         <button class="slider__btn next">></button>
      </div>
      

      <div class="slider__dots"></div>

   </section>

   <section class="loveis">
      <h1 class="loveis__title"></h1>
      <div class="loveis__img"></div>
      <img src='images\film.png' alt="" class="loveis__animation-img">
      <img src='images\film.png' alt="" class="loveis__animation-img">
         
   
   </section>
   <script src="js\slider.js"></script>
</body>
</html>
